<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地图天气 AI 助手 — 地图选点</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>地图天气 AI 助手</h1>
      <p>Lab 3-1 · 第一轮：嵌入高德地图，点击获取经纬度（含逆地理编码显示地名，对齐评分）</p>
    </header>
    <main>
      <p id="hint" class="hint panel">正在初始化…</p>
      <div id="map" class="panel" style="padding: 0; border: none"></div>
      <section class="panel" aria-live="polite">
        <h2>选中位置</h2>
        <dl class="pick-info">
          <dt>经纬度</dt>
          <dd class="coords" id="coords">尚未选点</dd>
          <dt>地名</dt>
          <dd class="address" id="address">—</dd>
        </dl>
      </section>
    </main>
    <script src="https://webapi.amap.com/loader.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
